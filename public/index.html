<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>羽球報名系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f0fdf4; }
    .modal-enter { animation: slideUp 0.25s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen">
  <!-- Header -->
  <div class="bg-green-600 text-white px-4 py-4 shadow">
    <h1 class="text-xl font-bold text-center tracking-wide">🏸 羽球報名系統</h1>
  </div>

  <div class="max-w-md mx-auto px-4 py-4 space-y-4">

    <!-- Activity Card -->
    <div id="activity-card" class="bg-white rounded-2xl shadow p-5">
      <div id="loading" class="text-center text-gray-400 py-6">載入中...</div>
      <div id="activity-info" class="hidden text-center">
        <div class="text-3xl font-bold text-green-600 mb-1" id="act-date"></div>
        <div class="text-gray-500 text-sm mb-2" id="act-time"></div>
        <div id="act-status" class="inline-block px-3 py-1 rounded-full text-sm font-medium mb-1"></div>
        <div id="act-deadline" class="text-xs text-gray-400"></div>
      </div>
    </div>

    <!-- Tier Cards -->
    <div id="tiers-container" class="space-y-3 hidden"></div>

    <!-- Check Registration -->
    <div class="bg-white rounded-2xl shadow p-5">
      <h3 class="font-bold text-gray-700 mb-3 text-base">查詢我的報名狀態</h3>
      <div class="flex gap-2">
        <input type="tel" id="check-phone" placeholder="輸入電話號碼"
          class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-gray-50">
        <button onclick="checkRegistration()"
          class="bg-gray-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-800 transition">查詢</button>
      </div>
      <div id="check-result" class="mt-3 hidden"></div>
    </div>

    <!-- 季繳會員請假 -->
    <div class="bg-white rounded-2xl shadow p-5" id="leave-section" style="display:none">
      <h3 class="font-bold text-gray-700 mb-1 text-base">🏃 季繳會員請假</h3>
      <p class="text-xs text-gray-400 mb-3">輸入請假密碼，為「補季繳請假」增加 1 個名額</p>
      <div class="flex gap-2">
        <input type="password" id="leave-password" placeholder="輸入請假密碼"
          class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50">
        <button onclick="submitLeave()"
          class="bg-blue-600 text-white px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700 transition">請假</button>
      </div>
      <div id="leave-result" class="mt-2 hidden text-sm"></div>
    </div>

  </div>

  <!-- Registration Bottom Sheet -->
  <div id="register-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-end" onclick="handleOverlayClick(event)">
    <div class="bg-white w-full rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto modal-enter" id="modal-sheet">
      <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold text-gray-800">填寫報名資料</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>

      <!-- Selected Tier Info -->
      <div class="bg-green-50 border border-green-100 rounded-xl p-3 mb-5">
        <div class="font-semibold text-green-800 text-base" id="modal-tier-name"></div>
        <div class="text-green-600 text-sm mt-0.5" id="modal-tier-price"></div>
        <div id="modal-tier-note" class="text-orange-500 text-xs mt-1 hidden">⚠️ 名額已滿，將加入候補名單</div>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">姓名</label>
          <input type="text" id="reg-name" placeholder="請輸入您的姓名"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">電話號碼</label>
          <input type="tel" id="reg-phone" placeholder="例：0912345678"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-gray-50">
        </div>
      </div>

      <div id="reg-error" class="mt-3 text-red-500 text-sm bg-red-50 rounded-lg px-3 py-2 hidden"></div>

      <button onclick="submitRegistration()" id="submit-btn"
        class="w-full mt-5 bg-green-600 text-white py-3.5 rounded-xl font-bold text-base hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
        確認報名
      </button>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="success-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center px-4">
    <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl">
      <div id="success-icon" class="text-6xl mb-4"></div>
      <h2 id="success-title" class="text-xl font-bold text-gray-800 mb-2"></h2>
      <p id="success-message" class="text-gray-500 text-sm mb-6 leading-relaxed"></p>
      <button onclick="closeSuccess()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">
        關閉
      </button>
    </div>
  </div>

  <script>
    let currentActivity = null;
    let selectedTier = null;

    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

    function formatDate(dateStr) {
      // dateStr = "YYYY-MM-DD", treat as local date
      const [y, m, d] = dateStr.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      return `${y} 年 ${m} 月 ${d} 日（週${weekdays[date.getDay()]}）`;
    }

    async function loadActivity() {
      try {
        const res = await fetch('/api/activity/current');
        const data = await res.json();

        document.getElementById('loading').classList.add('hidden');

        if (!data.activity) {
          document.getElementById('activity-card').innerHTML =
            '<p class="text-center text-gray-400 py-6">目前沒有開放的活動</p>';
          return;
        }

        currentActivity = data.activity;
        document.getElementById('activity-info').classList.remove('hidden');
        document.getElementById('act-date').textContent = formatDate(data.activity.activity_date);
        document.getElementById('act-time').textContent = `${data.activity.start_time} – ${data.activity.end_time}`;

        const statusEl = document.getElementById('act-status');
        const deadlineEl = document.getElementById('act-deadline');

        if (data.activity.is_open) {
          statusEl.textContent = '報名開放中';
          statusEl.className = 'inline-block px-3 py-1 rounded-full text-sm font-medium mb-1 bg-green-100 text-green-700';
          // Parse deadline as local datetime
          const dl = data.activity.deadline; // "YYYY-MM-DD HH:MM:SS"
          const [datePart, timePart] = dl.split(' ');
          const [dy, dm, dd] = datePart.split('-').map(Number);
          const [dh, dmin] = timePart.split(':').map(Number);
          deadlineEl.textContent = `報名截止：${dm}/${dd} ${String(dh).padStart(2,'0')}:${String(dmin).padStart(2,'0')}`;
        } else {
          statusEl.textContent = '報名已截止';
          statusEl.className = 'inline-block px-3 py-1 rounded-full text-sm font-medium mb-1 bg-red-100 text-red-600';
          deadlineEl.textContent = '';
        }

        // 顯示請假區塊（報名開放中才顯示）
        document.getElementById('leave-section').style.display = data.activity.is_open ? 'block' : 'none';

        // Render tier cards
        const container = document.getElementById('tiers-container');
        container.innerHTML = '';
        container.classList.remove('hidden');

        data.activity.tiers.forEach(tier => {
          const isFull = tier.available === 0;
          const card = document.createElement('div');
          card.className = 'bg-white rounded-2xl shadow p-5';

          card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
              <div>
                <h3 class="font-bold text-gray-800 text-base">${tier.name}</h3>
                <div class="text-2xl font-bold text-green-600 mt-1">NT$ ${tier.price}</div>
              </div>
              <div class="text-right">
                <div class="text-sm font-semibold ${isFull ? 'text-red-500' : 'text-green-600'}">
                  ${isFull ? '名額已滿' : `剩餘 ${tier.available} 位`}
                </div>
                <div class="text-xs text-gray-400 mt-0.5">${tier.confirmed_count} / ${tier.effective_capacity || tier.capacity} 人</div>
                ${(tier.leave_slots > 0) ? `<div class="text-xs text-blue-500 mt-0.5">含 ${tier.leave_slots} 位請假名額</div>` : ''}
                ${tier.waitlist_count > 0 ? `<div class="text-xs text-orange-400 mt-0.5">候補 ${tier.waitlist_count} 人</div>` : ''}
              </div>
            </div>
            ${data.activity.is_open ? `
              <button onclick='openRegister(${JSON.stringify(tier)})'
                class="${isFull
                  ? 'bg-orange-500 hover:bg-orange-600'
                  : 'bg-green-600 hover:bg-green-700'
                } text-white w-full py-3 rounded-xl font-semibold text-sm transition">
                ${isFull ? '加入候補名單' : '立即報名'}
              </button>
            ` : '<div class="text-center text-gray-400 text-sm py-2">報名已截止</div>'}
          `;
          container.appendChild(card);
        });

      } catch (err) {
        document.getElementById('loading').textContent = '載入失敗，請重新整理頁面';
        console.error(err);
      }
    }

    function openRegister(tier) {
      selectedTier = tier;
      const isFull = tier.available === 0;
      document.getElementById('modal-tier-name').textContent = tier.name;
      document.getElementById('modal-tier-price').textContent = `NT$ ${tier.price}`;
      document.getElementById('modal-tier-note').classList.toggle('hidden', !isFull);
      document.getElementById('reg-name').value = '';
      document.getElementById('reg-phone').value = '';
      document.getElementById('reg-error').classList.add('hidden');
      document.getElementById('submit-btn').textContent = isFull ? '確認加入候補' : '確認報名';
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('register-modal').classList.remove('hidden');
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('register-modal')) closeModal();
    }

    function closeModal() {
      document.getElementById('register-modal').classList.add('hidden');
    }

    async function submitRegistration() {
      const name = document.getElementById('reg-name').value.trim();
      const phone = document.getElementById('reg-phone').value.trim();
      const errorEl = document.getElementById('reg-error');
      const btn = document.getElementById('submit-btn');

      errorEl.classList.add('hidden');

      if (!name) { showError('請輸入姓名'); return; }
      if (!phone) { showError('請輸入電話號碼'); return; }

      btn.disabled = true;
      btn.textContent = '處理中...';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ activity_id: currentActivity.id, tier_id: selectedTier.id, name, phone })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || '報名失敗，請稍後再試');
          btn.disabled = false;
          btn.textContent = selectedTier.available === 0 ? '確認加入候補' : '確認報名';
          return;
        }

        closeModal();

        if (data.status === 'confirmed') {
          showSuccess('✅', '報名成功！', `${name}，你已成功報名。\n請記得準時出席！`);
        } else {
          showSuccess('⏳', '已加入候補！', `${name}，你目前是第 ${data.waitlist_position} 位候補。\n若有人取消，系統會依序遞補。`);
        }

        loadActivity();

      } catch (err) {
        showError('網路錯誤，請重試');
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('reg-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function showSuccess(icon, title, message) {
      document.getElementById('success-icon').textContent = icon;
      document.getElementById('success-title').textContent = title;
      document.getElementById('success-message').textContent = message;
      document.getElementById('success-modal').classList.remove('hidden');
    }

    function closeSuccess() {
      document.getElementById('success-modal').classList.add('hidden');
    }

    let lastCheckedPhone = '';

    async function checkRegistration() {
      const phone = document.getElementById('check-phone').value.trim();
      const resultEl = document.getElementById('check-result');
      resultEl.classList.remove('hidden');

      if (!phone) {
        resultEl.innerHTML = '<p class="text-red-500 text-sm">請輸入電話號碼</p>';
        return;
      }

      lastCheckedPhone = phone;
      resultEl.innerHTML = '<p class="text-gray-400 text-sm">查詢中...</p>';

      try {
        const res = await fetch(`/api/registration?phone=${encodeURIComponent(phone)}`);
        const data = await res.json();

        if (!data.registrations || data.registrations.length === 0) {
          resultEl.innerHTML = '<p class="text-gray-500 text-sm">查無此電話的報名記錄</p>';
          return;
        }

        const html = data.registrations.slice(0, 5).map(reg => {
          const [y, m, d] = reg.activity_date.split('-').map(Number);
          const dateStr = `${y}/${m}/${d}`;

          const statusHtml = reg.status === 'confirmed'
            ? '<span class="text-green-600 font-bold">✓ 確認報名</span>'
            : `<span class="text-orange-500 font-bold">⏳ 候補第 ${reg.waitlist_position} 位</span>`;

          // 判斷是否可以取消（週三中午12:00前）
          const cancelDeadline = new Date(`${reg.activity_date} 12:00:00`);
          const now = new Date();
          const canCancel = now < cancelDeadline;
          const activityPast = now >= new Date(`${reg.activity_date} 22:00:00`);

          let cancelBtn = '';
          if (activityPast) {
            cancelBtn = ''; // 活動已結束，不顯示
          } else if (canCancel) {
            cancelBtn = `<button onclick="cancelRegistration(${reg.id}, '${dateStr}')"
              class="mt-2 w-full border border-red-300 text-red-500 py-1.5 rounded-lg text-xs font-medium hover:bg-red-50 transition">
              取消報名
            </button>`;
          } else {
            cancelBtn = `<div class="mt-2 text-center text-xs text-gray-400 bg-gray-50 rounded-lg py-1.5">
              🔒 取消截止（週三 12:00）已過
            </div>`;
          }

          return `
            <div class="bg-gray-50 rounded-xl p-3 text-sm">
              <div class="font-medium text-gray-700 mb-1">${dateStr} 活動</div>
              <div class="text-gray-500">類型：${reg.tier_name}（NT$ ${reg.price}）</div>
              <div class="mt-1">狀態：${statusHtml}</div>
              ${cancelBtn}
            </div>
          `;
        }).join('');

        resultEl.innerHTML = `<div class="space-y-2">${html}</div>`;

      } catch (err) {
        resultEl.innerHTML = '<p class="text-red-500 text-sm">查詢失敗，請稍後再試</p>';
      }
    }

    async function cancelRegistration(regId, dateStr) {
      if (!confirm(`確定要取消 ${dateStr} 的報名嗎？\n取消後若有候補者會自動遞補，無法復原。`)) return;

      try {
        const res = await fetch(`/api/register/${regId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: lastCheckedPhone })
        });
        const data = await res.json();

        if (res.ok) {
          showSuccess('✅', '取消成功', '你的報名已取消。');
          checkRegistration(); // 重新整理查詢結果
          loadActivity();      // 更新名額顯示
        } else {
          alert(data.error || '取消失敗，請稍後再試');
        }
      } catch (err) {
        alert('網路錯誤，請稍後再試');
      }
    }

    document.getElementById('check-phone').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkRegistration();
    });

    document.getElementById('leave-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitLeave();
    });

    async function submitLeave() {
      const password = document.getElementById('leave-password').value.trim();
      const resultEl = document.getElementById('leave-result');
      if (!password) { resultEl.textContent = '請輸入密碼'; resultEl.className = 'mt-2 text-sm text-red-500'; resultEl.classList.remove('hidden'); return; }
      if (!currentActivity) return;

      try {
        const res = await fetch('/api/leave-unlock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ activity_id: currentActivity.id, password })
        });
        const data = await res.json();
        resultEl.classList.remove('hidden');
        if (res.ok) {
          resultEl.textContent = `✅ ${data.message}（已累計 ${data.leave_slots} 位請假）`;
          resultEl.className = 'mt-2 text-sm text-green-600';
          document.getElementById('leave-password').value = '';
          loadActivity();
        } else {
          resultEl.textContent = `❌ ${data.error}`;
          resultEl.className = 'mt-2 text-sm text-red-500';
        }
      } catch (err) {
        resultEl.textContent = '網路錯誤，請稍後再試';
        resultEl.className = 'mt-2 text-sm text-red-500';
        resultEl.classList.remove('hidden');
      }
    }

    loadActivity();
  </script>
</body>
</html>
